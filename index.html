<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Une question importante 💌</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg: #8e8ac1;
    --card: #1f0038;
    --title: #1a1a1a;
    --subtitle: #999999;
    --yes-from: #e8435a;
    --yes-to: #f07090;
    --yes-text: #ffffff;
    --no-bg: #f5f5f5;
    --no-text: #888888;
    --no-border: #e8e8e8;
    --choice-bg: #fff0f3;
    --choice-text: #e8435a;
    --choice-border: #f9c5cf;
    --accent: #e8435a;
  }
  body{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Inter',sans-serif;overflow:hidden;position:relative;}
  .bg-hearts{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .bg-hearts span{position:absolute;font-size:1.4rem;opacity:0.12;animation:floatUp linear infinite;}
  @keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:0.12;}100%{transform:translateY(-110vh) rotate(20deg);opacity:0;}}
  .card{position:relative;z-index:1;background:var(--card);border-radius:28px;padding:48px 52px 44px;max-width:540px;width:90%;text-align:center;box-shadow:0 8px 48px rgba(0,0,0,0.10),0 2px 12px rgba(0,0,0,0.06);}
  .slide{display:none;flex-direction:column;align-items:center;}
  .slide.active{display:flex;animation:fadeSlideIn 0.35s ease both;}
  @keyframes fadeSlideIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .slide-emoji{font-size:3.2rem;margin-bottom:16px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  .slide-img{display:none;object-fit:cover;border-radius:16px;margin-bottom:16px;}
  .slide-img.square{width:220px;height:220px;border-radius:20px;}
  .slide-img.landscape{width:100%;max-height:200px;height:auto;}
  h1.slide-title{font-family:'Playfair Display',serif;font-size:2rem;color:var(--title);line-height:1.35;margin-bottom:8px;}
  p.slide-sub{font-size:0.95rem;color:var(--subtitle);margin-bottom:32px;font-style:italic;}
  .yesno-row{display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap;}
  .btn-yes{background:linear-gradient(135deg,var(--yes-from),var(--yes-to));color:var(--yes-text);border:none;border-radius:50px;padding:16px 44px;font-size:1.1rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 4px 18px rgba(0,0,0,0.15);transition:transform 0.15s;}
  .btn-yes:hover{transform:scale(1.06);}
  .btn-no-anchor{background:var(--no-bg);color:var(--no-text);border:2px solid var(--no-border);border-radius:50px;padding:14px 36px;font-size:1rem;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;visibility:hidden;}
  #fleeBtn{position:fixed;z-index:9999;background:var(--no-bg);color:var(--no-text);border:2px solid var(--no-border);border-radius:50px;padding:14px 36px;font-size:1rem;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;display:none;transition:left 0.18s cubic-bezier(0.22,1,0.36,1),top 0.18s cubic-bezier(0.22,1,0.36,1);}
  .choices-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:4px;}
  .choice-btn{background:var(--choice-bg);color:var(--choice-text);border:2px solid var(--choice-border);border-radius:50px;padding:13px 26px;font-size:1rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s,transform 0.15s;}
  .choice-btn:hover{background:var(--choice-text);color:#fff;transform:scale(1.06);}
  .final-emoji{font-size:4rem;animation:popIn 0.4s cubic-bezier(.2,1.5,.4,1) both;}
  @keyframes popIn{0%{transform:scale(0);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .final-title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--accent);margin-top:12px;}
  .final-msg{color:var(--subtitle);font-size:0.95rem;margin-top:8px;}
  .datetime-picker{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
  .dt-group{display:flex;flex-direction:column;align-items:flex-start;gap:6px;}
  .dt-label{font-size:0.85rem;color:var(--subtitle);font-weight:500;}
  input[type=date],input[type=time]{border:2px solid var(--choice-border);border-radius:14px;padding:12px 18px;font-size:1rem;font-family:'Inter',sans-serif;color:var(--title);background:var(--choice-bg);outline:none;cursor:pointer;}
  .datetime-result{margin-top:18px;background:var(--choice-bg);border-radius:16px;padding:14px 22px;display:none;color:var(--accent);font-weight:600;font-size:1rem;}
  .progress-bar{position:absolute;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--yes-from),var(--yes-to));border-radius:28px 28px 0 0;transition:width 0.4s ease;}
  .confetti-piece{position:fixed;border-radius:2px;opacity:0;animation:confettiFall 1.4s ease-in forwards;pointer-events:none;z-index:9999;}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>

<button id="fleeBtn"></button>
<div class="card" id="card">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
  <div id="slidesContainer"></div>
</div>

let currentSlide=0;
(function(){const c=document.getElementById('bgHearts');const h=['❤️','🩷','💕','💖','💗'];for(let i=0;i<18;i++){const s=document.createElement('span');s.textContent=h[Math.floor(Math.random()*h.length)];s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';s.style.fontSize=(0.9+Math.random()*1.2)+'rem';const d=8+Math.random()*12;s.style.animationDuration=d+'s';s.style.animationDelay=-Math.random()*d+'s';c.appendChild(s);}})();
function buildSlideHTML(slide){
  const iD=slide.imgSrc?'block':'none',eD=slide.imgSrc?'none':'block',iC=slide.square?'square':'landscape';
  const img=`<img class="slide-img ${iC}" src="${slide.imgSrc}" style="display:${iD}">`;
  const em=`<div class="slide-emoji" style="display:${eD}">${slide.emoji}</div>`;
  const hdr=`${em}${img}<h1 class="slide-title">${slide.title}</h1><p class="slide-sub">${slide.sub||''}</p>`;
  if(slide.type==='yesno') return hdr+`<div class="yesno-row"><button class="btn-yes" onclick="goToId(${JSON.stringify(slide.yesTarget||null)})">${slide.yes}</button><button class="btn-no-anchor" id="no-anchor-${slide.id}">${slide.no}</button></div>`;
  if(slide.type==='choices'){
    const b=(slide.choices||[]).map(c=>{
      const lbl=typeof c==='object'?c.label:c;
      const tgt=typeof c==='object'?(c.target||null):null;
      return`<button class="choice-btn" onclick="goToId(${JSON.stringify(tgt)})">${lbl}</button>`;
    }).join('');
    return hdr+`<div class="choices-grid">${b}</div>`;
  }
  if(slide.type==='datetime') return hdr+`<div class="datetime-picker"><div class="dt-group"><label class="dt-label">📆 Date</label><input type="date" id="dt-date-${slide.id}"></div><div class="dt-group"><label class="dt-label">🕐 Heure</label><input type="time" id="dt-time-${slide.id}"></div></div><button class="btn-yes" style="margin-top:24px;" onclick="confirmDatetime(${slide.id})">${slide.btn||"C'est noté ! 💕"}</button>`;
  if(slide.type==='message') return hdr+`<button class="btn-yes" onclick="nextSlide()">${slide.btn||'Continuer →'}</button>`;
  if(slide.type==='final') return`<div class="final-emoji">${slide.emoji}</div>${slide.imgSrc?`<img class="slide-img ${iC}" src="${slide.imgSrc}" style="display:block;margin-top:12px;">`:''}<h2 class="final-title">${slide.title}</h2><p class="final-msg">${slide.msg||''}</p><div class="datetime-result" id="dt-result"></div>`;
  return hdr;
}
function render(){const c=document.getElementById('slidesContainer');c.innerHTML='';slides.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===currentSlide?' active':'');d.id='slide-'+s.id;d.innerHTML=buildSlideHTML(s);c.appendChild(d);});updateProgress();updateFlee();}
function updateProgress(){const p=slides.length>1?(currentSlide/(slides.length-1))*100:0;document.getElementById('progressBar').style.width=p+'%';}
function nextSlide(){if(currentSlide<slides.length-1){document.getElementById('slide-'+slides[currentSlide].id).classList.remove('active');currentSlide++;document.getElementById('slide-'+slides[currentSlide].id).classList.add('active');updateProgress();updateFlee();}}
function goToId(id){if(id===null||id===undefined){nextSlide();return;}const i=slides.findIndex(s=>s.id===id);if(i===-1){nextSlide();return;}document.getElementById('slide-'+slides[currentSlide].id).classList.remove('active');currentSlide=i;document.getElementById('slide-'+slides[currentSlide].id).classList.add('active');updateProgress();updateFlee();}
function confirmDatetime(id){const d=document.getElementById('dt-date-'+id)?.value||'',t=document.getElementById('dt-time-'+id)?.value||'';lc();setTimeout(()=>{nextSlide();const r=document.getElementById('dt-result');if(r&&(d||t)){let txt='';if(d){const dt=new Date(d+'T00:00');txt+=dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}if(t)txt+=(d?' à ':'')+t;r.textContent='📅 '+txt;r.style.display='block';}},400);}
const fb=document.getElementById('fleeBtn');let fx=0,fy=0,fa=false,tx=0,ty=0,af=null,anc=null,pmx=null,pmy=null,pmt=null;
function updateFlee(){const s=slides[currentSlide];if(s&&s.type==='yesno'){setTimeout(()=>{const a=document.getElementById('no-anchor-'+s.id);if(a)attachFlee(a,s.no);},50);}else hideFlee();}
function attachFlee(anchor,label){if(anc)anc.style.visibility='hidden';anc=anchor;anc.style.visibility='hidden';const r=anc.getBoundingClientRect();fx=r.left;fy=r.top;tx=fx;ty=fy;fb.textContent=label;fb.style.width=r.width+'px';fb.style.left=fx+'px';fb.style.top=fy+'px';fb.style.display='block';fa=true;pmx=null;pmy=null;pmt=null;loop();}
function hideFlee(){fb.style.display='none';fa=false;if(anc){anc.style.visibility='hidden';anc=null;}if(af){cancelAnimationFrame(af);af=null;}}
function loop(){fx+=(tx-fx)*0.14;fy+=(ty-fy)*0.14;fb.style.left=fx+'px';fb.style.top=fy+'px';af=requestAnimationFrame(loop);}
function fleeFrom(mx,my){if(!fa)return;const bw=fb.offsetWidth,bh=fb.offsetHeight,cx=fx+bw/2,cy=fy+bh/2,dx=cx-mx,dy=cy-my,dist=Math.sqrt(dx*dx+dy*dy)||1,cd=Math.max(0,dist-Math.sqrt(bw*bw+bh*bh)/2);if(cd>5){pmx=mx;pmy=my;pmt=performance.now();return;}const now=performance.now();let vx=0,vy=0;if(pmx!==null&&pmt!==null){const dt=Math.max(1,now-pmt);vx=(mx-pmx)/dt;vy=(my-pmy)/dt;}pmx=mx;pmy=my;pmt=now;const sp=Math.sqrt(vx*vx+vy*vy)||0,force=80+sp*400;let ex,ey;if(sp>0.05){ex=-vx/sp;ey=-vy/sp;}else{ex=dx/dist;ey=dy/dist;}tx=fx+ex*force;ty=fy+ey*force;const m=8;tx=Math.max(m,Math.min(window.innerWidth-bw-m,tx));ty=Math.max(m,Math.min(window.innerHeight-bh-m,ty));}
document.addEventListener('mousemove',e=>fleeFrom(e.clientX,e.clientY));
document.addEventListener('touchmove',e=>{const t=e.touches[0];fleeFrom(t.clientX,t.clientY);},{passive:true});
function lc(){const cols=['#e8435a','#f5a623','#7ed321','#4a90e2','#bd10e0','#f8e71c'];for(let i=0;i<80;i++)setTimeout(()=>{const c=document.createElement('div');c.className='confetti-piece';c.style.left=Math.random()*100+'vw';c.style.top='-10px';c.style.background=cols[Math.floor(Math.random()*cols.length)];c.style.width=(6+Math.random()*8)+'px';c.style.height=(6+Math.random()*8)+'px';c.style.animationDuration=(1+Math.random()*1.2)+'s';c.style.animationDelay=(Math.random()*0.6)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),2500);},i*18);}
window.addEventListener('DOMContentLoaded',()=>render());
</script>
